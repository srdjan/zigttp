name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  ZIG_VERSION: '0.16.0-dev.3073+28ae5d415'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    timeout-minutes: 30
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Run all tests
        run: zig build test test-zigts test-zruntime

      - name: Build zigts for policy hash check
        run: zig build -Doptimize=ReleaseFast

      - name: Assert policy hash unchanged
        run: |
          EXPECTED=$(cat policy-hash.txt 2>/dev/null || echo "")
          ACTUAL=$(./zig-out/bin/zigts describe-rule --hash)
          if [ -n "$EXPECTED" ] && [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Policy hash mismatch - rules changed without updating policy-hash.txt"
            echo "Expected: $EXPECTED"
            echo "Actual:   $ACTUAL"
            echo "Run: ./zig-out/bin/zigts describe-rule --hash > policy-hash.txt"
            exit 1
          fi

  build:
    needs: test
    timeout-minutes: 30
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: x86_64-macos-none
            os: macos
            arch: x86_64
          - target: aarch64-macos-none
            os: macos
            arch: aarch64
          - target: x86_64-linux-gnu
            os: linux
            arch: x86_64
          - target: aarch64-linux-gnu
            os: linux
            arch: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build release binaries
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}

      - name: Package tarball
        run: |
          VERSION="${GITHUB_REF_NAME}"
          DIR="zigttp-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir -p "${DIR}"
          cp zig-out/bin/zigttp "${DIR}/"
          cp zig-out/bin/zigts "${DIR}/"
          cp build.zig "${DIR}/"
          tar czf "${DIR}.tar.gz" "${DIR}"
          shasum -a 256 "${DIR}.tar.gz" > "${DIR}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: zigttp-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            zigttp-*.tar.gz
            zigttp-*.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create checksums file
        run: cat *.sha256 > checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Install

            ```
            curl -fsSL https://raw.githubusercontent.com/srdjan/zigttp/main/install.sh | sh
            ```

            Or download a tarball below and extract it manually.
          files: |
            zigttp-*.tar.gz
            zigttp-*.tar.gz.sha256
            checksums-sha256.txt
