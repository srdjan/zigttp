name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  ZIG_VERSION: '0.16.0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROOF_LEDGER_PATH: ${{ vars.PROOF_LEDGER_PATH || '' }}
  PROOF_LEDGER_ONTO: ${{ vars.PROOF_LEDGER_ONTO || 'HEAD' }}

jobs:
  test:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Verify release tag matches version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(awk -F'"' '/^[[:space:]]*\.version =/ { print $2; exit }' build.zig.zon)"
          BINARY_VERSION="$(awk -F'"' '/^[[:space:]]*pub const string = "/ { print $2; exit }' packages/zigts/src/root.zig)"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::release tag v${TAG_VERSION} does not match build.zig.zon version ${PACKAGE_VERSION}"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$BINARY_VERSION" ]; then
            echo "::error::release tag v${TAG_VERSION} does not match binary version ${BINARY_VERSION}"
            exit 1
          fi

      - name: Run aggregate tests
        run: zig build test

      - name: Run focused runtime tests
        run: zig build test-zruntime

      - name: Run docs link gate
        run: zig build test-doc-links

      - name: Build release binaries
        run: zig build -Doptimize=ReleaseFast

      - name: Run v1 user-flow smoke
        run: zig build smoke-v1

      - name: Run panic isolation smoke
        run: zig build test-panic-isolation

      - name: Run Getting Started smoke
        if: ${{ matrix.os == 'macos-latest' }}
        run: zig build smoke-getting-started

      - name: Run Proof Passport demo smoke
        if: ${{ matrix.os == 'macos-latest' }}
        run: zig build smoke-demo

      - name: Run Studio smoke
        if: ${{ matrix.os == 'macos-latest' }}
        run: zig build smoke-studio

      - name: Replay proof ledger
        if: ${{ vars.PROOF_LEDGER_PATH != '' }}
        run: |
          test -f "$PROOF_LEDGER_PATH"
          ./zig-out/bin/zigttp ledger replay --input "$PROOF_LEDGER_PATH" --onto "$PROOF_LEDGER_ONTO"

      - name: Run example handler tests
        run: bash scripts/test-examples.sh

      - name: Run installer archive safety tests
        run: bash scripts/test-install-archive-safety.sh

      - name: Assert policy hash unchanged
        run: |
          if [ ! -f policy-hash.txt ]; then
            echo "::error::policy-hash.txt is missing - the policy hash baseline must be committed"
            echo "Run: ./zig-out/bin/zigts describe-rule --hash > policy-hash.txt"
            exit 1
          fi
          EXPECTED=$(cat policy-hash.txt)
          ACTUAL=$(./zig-out/bin/zigts describe-rule --hash)
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Policy hash mismatch - rules changed without updating policy-hash.txt"
            echo "Expected: $EXPECTED"
            echo "Actual:   $ACTUAL"
            echo "Run: ./zig-out/bin/zigts describe-rule --hash > policy-hash.txt"
            exit 1
          fi

      - name: Verify expert subsystem
        run: |
          META=$(./zig-out/bin/zigts meta --json)
          echo "$META" | jq -e '.rule_count >= 25'
          echo "$META" | jq -e '.policy_hash | length == 64'

  build:
    needs: test
    timeout-minutes: 30
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: x86_64-macos-none
            os: macos
            arch: x86_64
          - target: aarch64-macos-none
            os: macos
            arch: aarch64
          - target: x86_64-linux-gnu
            os: linux
            arch: x86_64
          - target: aarch64-linux-gnu
            os: linux
            arch: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build release binaries
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}

      - name: Package tarball
        run: |
          VERSION="${GITHUB_REF_NAME}"
          DIR="zigttp-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir -p "${DIR}"
          cp zig-out/bin/zigttp "${DIR}/"
          cp zig-out/bin/zigttp-runtime "${DIR}/"
          cp zig-out/bin/zigts "${DIR}/"
          cp LICENSE README.md CHANGELOG.md "${DIR}/"
          cat > "${DIR}/VERSION" <<EOF
          version=${VERSION}
          target=${{ matrix.target }}
          os=${{ matrix.os }}
          arch=${{ matrix.arch }}
          EOF
          tar czf "${DIR}.tar.gz" "${DIR}"
          tar tzf "${DIR}.tar.gz" | grep -qx "${DIR}/zigttp"
          tar tzf "${DIR}.tar.gz" | grep -qx "${DIR}/zigttp-runtime"
          tar tzf "${DIR}.tar.gz" | grep -qx "${DIR}/zigts"
          tar tzf "${DIR}.tar.gz" | grep -qx "${DIR}/LICENSE"
          tar tzf "${DIR}.tar.gz" | grep -qx "${DIR}/README.md"
          tar tzf "${DIR}.tar.gz" | grep -qx "${DIR}/CHANGELOG.md"
          tar tzf "${DIR}.tar.gz" | grep -qx "${DIR}/VERSION"
          shasum -a 256 "${DIR}.tar.gz" > "${DIR}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: zigttp-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            zigttp-*.tar.gz
            zigttp-*.tar.gz.sha256

  smoke-linux:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: zigttp-linux-x86_64

      - name: Smoke-test the cross-compiled linux x86_64 binary
        run: |
          VERSION="${GITHUB_REF_NAME}"
          DIR="zigttp-${VERSION}-linux-x86_64"
          tar xzf "${DIR}.tar.gz"
          BIN="${DIR}/zigttp"
          chmod +x "${BIN}" "${DIR}/zigts" "${DIR}/zigttp-runtime"

          # version: proves the cross-compiled binary loads and runs natively
          VERSION_OUT="$("${BIN}" version)"
          echo "version: ${VERSION_OUT}"
          echo "${VERSION_OUT}" | grep -q "${VERSION#v}" \
            || { echo "::error::linux binary version '${VERSION_OUT}' does not contain ${VERSION#v}"; exit 1; }

          # help: proves argument parsing
          "${BIN}" --help >/dev/null

          # serve + curl: exercises the engine/VM and socket stack under native linux
          PORT=8137
          "${BIN}" serve -e 'function handler(req) { return Response.json({ ok: true }); }' -p "${PORT}" &
          SERVER_PID=$!
          trap 'kill "${SERVER_PID}" 2>/dev/null || true' EXIT
          BODY=""
          for _ in $(seq 1 50); do
            if BODY=$(curl -sf "http://127.0.0.1:${PORT}/" 2>/dev/null); then break; fi
            sleep 0.2
          done
          echo "body: ${BODY}"
          echo "${BODY}" | grep -Eq '"ok"[[:space:]]*:[[:space:]]*true' \
            || { echo "::error::linux serve smoke did not return ok:true (got: ${BODY})"; exit 1; }

  release:
    needs: [build, smoke-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create checksums file
        run: cat *.sha256 > checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Install

            ```
            curl -fsSL https://raw.githubusercontent.com/srdjan/zigttp/main/install.sh | sh
            ```

            Or download a tarball below and extract it manually.

            ## Documentation

            - [User Guide](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/user-guide.md)
            - [CLI Reference](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/cli.md)
            - [Examples](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/examples/README.md)
          files: |
            zigttp-*.tar.gz
            zigttp-*.tar.gz.sha256
            checksums-sha256.txt
